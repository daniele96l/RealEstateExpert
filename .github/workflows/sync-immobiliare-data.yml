name: Sync occupancy seed data

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python scraper
        run: |
          pip install -e "./reggio_rentals[dev]"
          playwright install chromium

      - name: Scrape and export Reggio Calabria prod seed data
        run: npm run data:sync-immobiliare

      - name: Scrape and export Brno prod seed data
        run: npm run data:sync-brno

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/listings/reggio_calabria_rent.json \
            data/occupancy/it_reggio_calabria/immobiliare_scraper/ \
            data/listings/cz_brno_rent.json \
            data/occupancy/cz_brno/sreality/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit \
            -m "chore(data): refresh occupancy seed data for prod" \
            -m "Automated sync of Reggio Calabria (Immobiliare scraper) and Brno (Sreality) rental listings and occupancy snapshots."
          git push
