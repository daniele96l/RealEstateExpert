name: Sync occupancy seed data

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python scraper
        run: |
          pip install -e "./reggio_rentals[dev]"
          playwright install chromium

      - name: Check CI secrets
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          if [ -z "${APIFY_API_TOKEN}" ]; then
            echo "::warning::APIFY_API_TOKEN is not configured. Reggio sync will fail if the Playwright scraper is blocked on CI."
          fi

      - name: Scrape and export Reggio Calabria prod seed data
        id: reggio
        continue-on-error: true
        env:
          SCRAPER_PROXY_SERVER: ${{ secrets.SCRAPER_PROXY_SERVER }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: npm run data:sync-immobiliare

      - name: Scrape and export Brno prod seed data
        id: brno
        continue-on-error: true
        run: npm run data:sync-brno

      - name: Commit and push if changed
        env:
          REGGIO_OUTCOME: ${{ steps.reggio.outcome }}
          BRNO_OUTCOME: ${{ steps.brno.outcome }}
        run: |
          if [ "${REGGIO_OUTCOME}" = "failure" ] && [ "${BRNO_OUTCOME}" = "failure" ]; then
            echo "Both Reggio and Brno sync failed"
            exit 1
          fi
          if [ "${REGGIO_OUTCOME}" = "failure" ]; then
            echo "::warning::Reggio sync failed; committing Brno changes only"
          fi
          if [ "${BRNO_OUTCOME}" = "failure" ]; then
            echo "::warning::Brno sync failed; committing Reggio changes only"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/listings/reggio_calabria_rent.json \
            data/occupancy/it_reggio_calabria/immobiliare_scraper/ \
            data/listings/cz_brno_rent.json \
            data/occupancy/cz_brno/sreality/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit \
            -m "chore(data): refresh occupancy seed data for prod" \
            -m "Automated sync of Reggio Calabria (Immobiliare scraper) and Brno (Sreality) rental listings and occupancy snapshots."
          git push
