name: Sync occupancy seed data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check CI secrets
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          if [ -z "${APIFY_API_TOKEN}" ]; then
            echo "::error::APIFY_API_TOKEN is not configured. Reggio Immobiliare sync cannot run on CI."
            exit 1
          fi

      - name: Scrape and export Reggio Calabria prod seed data
        id: reggio
        continue-on-error: true
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: npm run data:sync-immobiliare

      - name: Refresh Czech occupancy snapshots
        id: cz
        continue-on-error: true
        run: npm run data:sync-occupancy:cz

      - name: Commit and push if changed
        env:
          REGGIO_OUTCOME: ${{ steps.reggio.outcome }}
          CZ_OUTCOME: ${{ steps.cz.outcome }}
        run: |
          if [ "${REGGIO_OUTCOME}" = "failure" ] && [ "${CZ_OUTCOME}" = "failure" ]; then
            echo "Both Reggio and Czech sync failed"
            exit 1
          fi
          if [ "${REGGIO_OUTCOME}" = "failure" ]; then
            echo "::warning::Reggio sync failed; committing Czech changes only"
          fi
          if [ "${CZ_OUTCOME}" = "failure" ]; then
            echo "::warning::Czech sync failed; committing Reggio changes only"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/listings/reggio_calabria_rent.json \
            data/occupancy/it_reggio_calabria/immobiliare_scraper/ \
            data/listings/cz_*_rent.json \
            data/occupancy/cz_*/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit \
            -m "chore(data): refresh occupancy seed data for prod" \
            -m "Automated sync of Reggio Calabria (Immobiliare) and Czech Sreality occupancy snapshots."
          git push
